<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Signup</title>
</head>
<body>
    <div class="container">
        <h1>Signup</h1>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="text" id="password" placeholder="Enter your password">
        </div>

        <div class="input-group">
            <label for="firstName">first Name</label>
            <input type="text" id="firstName" placeholder="Enter your firstName">
        </div>

        <div class="input-group">
            <label for="lastName">last Name</label>
            <input type="text" id="lastName" placeholder="Enter your lastName">
        </div>

        <button onclick="signup()">Sign up</button>
    </div>

    <script>
        async function signup(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;

            try{
                await axios.post("http://localhost:3000/signup", {username, password, firstName, lastName});
                alert('Signup succesfull');
                window.location = '/signin';
            }
            catch(error){
                console.log("Signup failed", error);
                alert('Something went wrong');
            }
        }
    </script>
</body>
</html>
