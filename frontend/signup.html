<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Signup</title>
</head>

<style>
    body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    }

    .container {
        width: 380px;
        padding: 30px 25px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 18px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .container:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        color: #333;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    label {
        font-weight: 600;
        font-size: 14px;
        color: #555;
    }

    input {
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
        transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }

    button {
        margin-top: 15px;
        height: 45px;
        border: none;
        border-radius: 12px;
        background: green;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    #signbtn {
        color: white;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 0.5px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
    }

    button:active {
        transform: scale(0.98);
    }
</style>

<body>
    <div class="container">
        <h1>Register</h1>

        <div class="input-group">
            <label for="username">Username: </label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>

        <div class="input-group">
            <label for="password">Password: </label>
            <input type="text" id="password" placeholder="Enter your password">
        </div>

        <div class="input-group">
            <label for="firstName">First Name: </label>
            <input type="text" id="firstName" placeholder="Enter your firstName">
        </div>

        <div class="input-group">
            <label for="lastName">Last Name: </label>
            <input type="text" id="lastName" placeholder="Enter your lastName">
        </div>

        <button onclick="signup()"><p id="signbtn">Sign up</p></button>
        <p>If already registered. <a href="signin.html">Sign in</a></p>
    </div>

    <script>
        async function signup(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;

            try{
                await axios.post("http://localhost:3000/signup", {username, password, firstName, lastName});
                alert('Signup succesfull');
                window.location = '/signin';
            }
            catch(error){
                console.log("Signup failed", error);
                alert('Something went wrong');
            }
        }
    </script>
</body>
</html>
