<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Home page</title>
</head>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        min-height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #eef2f7, #ffffff);
    }

    .ctr1, .ctr2 {
        background: #ffffff;
        padding: 25px;
        width: 360px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .ctr1 h1 {
        font-size: 22px;
        margin-bottom: 10px;
        color: #222;
    }

    #myAccount {
        background: rgb(120, 191, 15);
        color: white;
        padding: 20px;
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    #myAccount h3:last-child {
        font-size: 20px;
        font-weight: bold;
    }

    #myAccount h3 {
        margin: 0;
        font-weight: 500;
    }

    .ctr2 h1 {
        font-size: 20px;
        color: #222;
    }

    .ctr2 h3 {
        font-size: 14px;
        color: #666;
        margin-bottom: 5px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    label {
        font-size: 13px;
        font-weight: 600;
        color: #555;
    }

    input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.2s;
    }

    input:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 4px rgba(76,175,80,0.3);
    }

    button {
        margin-top: 10px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: rgb(36, 172, 84);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    #logout {
        margin-top: 10px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: red;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    #logout:hover{
        transform: translateY(-2px);
        box-shadow: 0px 2px 5px rgb(255, 106, 0);
    }

    button:hover {
        transform: translateY(-2px);
    }

    #transactionDetails {
        margin-top: 10px;
        background: #f5f7fa;
        padding: 12px;
        border-radius: 10px;
    }

    #transactionDetails h3 {
        font-size: 13px;
        text-align: left;
        margin: 3px 0;
    }

</style>

<body>
    <div class="ctr1">
        <h1>My dashboard</h1>
        <div id="myAccount"></div>
        <button onclick="editUser()"><p id="btnTxt">Edit user details</p></button>
        <div id="edit"></div>
    </div>

    <div class="ctr2">
        <h1>My Transactions</h1>
        <h3>Want to send money?</h3>

        <div class="input-group">
            <label for="recipentName">Recipent Name</label>
            <input type="text" id="recipentName" placeholder="Enter recipent Name">
        </div>

        <div class="input-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Enter amount">
        </div>

        <button onclick="transact()"><p id="btnTxt">Transact</p></button>

        <div id="transactionDetails"></div>

    </div>

    <button onclick="logout()" id="logout"><p id="btnTxt">Logout</p></button>

    <script>
        if(!localStorage.getItem("token")){
            window.location = "/signin";
        }

        async function transact(){
            const reciever_user = document.getElementById("recipentName").value;
            const transferAmt = document.getElementById("amount").value;

            try{
                const response = await axios.post(
                    `${window.location.origin}/transfer`,
                    {
                        reciever_user,
                        transferAmt
                    },
                    {
                        headers: {
                            token: localStorage.getItem("token")
                        }
                    }
                );

                alert('transfer succesfull');

                const details = response.data;

                document.getElementById("transactionDetails").innerHTML += `
                    <h1> Transaction details </h1>
                    <h3>sender: ${details.sender.username}</h3> 
                    <h3>balance: ${details.sender.balance}</h3>

                    <h3>reciever: ${details.receiver.username}</h3> 
                    <h3>balance: ${details.receiver.balance}</h3> 
                    <br>
                    <br>
                `
            }
            catch(error){
                console.log("transfer failed", error);
                alert('Something went wrong');
            }
        }

        async function getAccount(){
            const response = await axios.get(`${window.location.origin}/userDetails`, {
                headers: {
                    token: localStorage.getItem("token")
                }
            })

            const data = response.data;

            document.getElementById("myAccount").innerHTML = `
                <h3>username: ${data.username}</h3> 
                <h3>firstname: ${data.firstname}</h3>
                <h3>lastname: ${data.lastname}</h3>   

                <h3>balance: ${data.balance}</h3>   
            `
        }

        async function editUser(){
            document.getElementById("edit").innerHTML = `
                <div class="input-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" placeholder="Enter new first Name">
                </div>

                <div class="input-group">
                    <label for="lastname">last Name</label>
                    <input type="text" id="lastname" placeholder="Enter new last Name">
                </div>

                <button onclick="update()"><p id="btnTxt">Update details</p></button>
            `
        }

        async function update(){
            const nfirstName = document.getElementById("firstname").value;
            const nlastName = document.getElementById("lastname").value;

            try{
                const response = await axios.put(
                    `${window.location.origin}/editUser`,
                    {
                        nfirstName,
                        nlastName
                    },
                    {
                        headers: {
                            token: localStorage.getItem("token")
                        }
                    }
                );

                alert('updated names succesfull. please refresh the page');
            }
            catch(error){
                console.log("updating names failed", error);
                alert('Something went wrong');
            }
        }

        async function logout(){
            localStorage.removeItem("token");
            window.location = "/signin";
        }

        getAccount();
    </script>

</body>
</html>
